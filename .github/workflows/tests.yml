name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Check formatting with black
        run: black --check src tests

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke test full pipeline on synthetic data
        run: |
          python -m clinical_llm.data.synthetic_generator --n-patients 200 --out-dir data/synthetic
          python -m clinical_llm.training.train --model logreg --data-dir data/synthetic --out-dir outputs/ci_logreg
          python -m clinical_llm.training.train --model xgboost --data-dir data/synthetic --out-dir outputs/ci_xgboost
          python -m clinical_llm.training.train --model lstm --data-dir data/synthetic --out-dir outputs/ci_lstm
